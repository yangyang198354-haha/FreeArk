name: CI

# 回归测试门控：push 到 main 与所有对 main 的 PR 触发。
# 三个组件 job 并行：后端 Django / 数据采集 pytest / 前端 Vitest+构建。
# 外部依赖（MySQL/Redis/MQTT/PLC）在测试层已用 SQLite 内存库 / DummyCache /
# InMemoryChannelLayer / mock 替身，CI 无需起任何外部服务。详见各 job 注释。
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.claude/**'
  pull_request:
    branches: [main]

# 同一分支/PR 的新 push 取消仍在跑的旧 run，省额度。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: 后端 Django 测试
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: FreeArkWeb/backend/requirements.txt

      # mysqlclient 是 C 扩展，pip 编译需系统头文件。即便测试走 SQLite，
      # requirements.txt 仍含 mysqlclient，安装阶段必须有此库（固定 ubuntu-24.04
      # 以稳定 libmysqlclient-dev 包名）。
      - name: Install system deps for mysqlclient
        run: |
          sudo apt-get update
          sudo apt-get install -y libmysqlclient-dev pkg-config

      - name: Install Python dependencies
        run: pip install -r FreeArkWeb/backend/requirements.txt

      # 整套运行（不按 @tag 过滤），保证全部用例都执行——本项目历史上有过
      # 未打 tag 的测试被 --tag 过滤静默漏跑的教训。
      #   FREEARK_POC_MOCK=1            : fa_tools 离线导入所必需
      #   --settings=...test_settings   : 自动切 SQLite 内存库 + DummyCache +
      #                                   InMemoryChannelLayer，不连任何外部服务
      - name: Run backend test suite
        working-directory: FreeArkWeb/backend/freearkweb
        env:
          FREEARK_POC_MOCK: '1'
        run: python manage.py test api --settings=freearkweb.test_settings --verbosity=1

  datacollection-test:
    name: 数据采集 pytest
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: datacollection/requirements.txt

      # python-snap7 / paho-mqtt 有 x86_64 wheel，无需 PLC 硬件或 MQTT broker
      # （测试用 mock 替身）。pytest 是测试专用依赖，未列入 requirements.txt，单独装。
      - name: Install Python dependencies
        run: |
          pip install -r datacollection/requirements.txt
          pip install pytest

      - name: Run datacollection tests
        working-directory: datacollection
        run: python -m pytest tests/ -v

  frontend-test:
    name: 前端 Vitest + 构建
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FreeArkWeb/frontend/package-lock.json

      # 用 npm install 而非 npm ci：仓库现有 package-lock.json 与 package.json 脱节
      # （缺 esbuild 等条目），npm ci 严格校验会直接失败。npm install 容忍并就地更新。
      # TODO: 在有 Node 的环境重新生成 package-lock.json 后可改回更严格的 npm ci。
      - name: Install dependencies
        working-directory: FreeArkWeb/frontend
        run: npm install

      - name: Run Vitest
        working-directory: FreeArkWeb/frontend
        run: npm run test

      - name: Build (compile check)
        working-directory: FreeArkWeb/frontend
        run: npm run build
